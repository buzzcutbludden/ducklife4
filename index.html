<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duck Life 4</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #eee;
    }
    h1 {
      margin: 16px 0 10px;
      font-size: 1.5rem;
      color: #f0c040;
    }
    #game-container {
      width: min(800px, 100vw);
      height: min(600px, 75vw);
      background: #000;
      border: 2px solid #f0c040;
      border-radius: 6px;
      overflow: hidden;
    }
    ruffle-player {
      width: 100%;
      height: 100%;
    }
    p {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>🦆 Duck Life 4</h1>
  <div id="game-container">
    <ruffle-player src="DuckLife4.swf" scale="showAll" quality="high"></ruffle-player>
  </div>
  <p>Powered by Ruffle · Games belong to their rightful owners</p>
</body>
</html>
