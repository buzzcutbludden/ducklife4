<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duck Life 4</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    @media (max-width: 1600px) {
      iframe {
        width: 100vw;
        height: 75vw;
      }
    }
  </style>
</head>
<body>
  <iframe id="main" scrolling="no" frameborder="0" allowtransparency="true" allow="fullscreen" allowfullscreen></iframe>

  <script>
    var swfPath = "DuckLife4.swf";

    var t = '<script src="https://unpkg.com/@ruffle-rs/ruffle"><\/script>'
          + '<embed width="100%" height="100%" name="plugin" id="plugin" src="' + swfPath + '" type="application/x-shockwave-flash">';

    var e = document.getElementById("main");
    e = e.contentWindow || e.contentDocument.document || e.contentDocument;
    e.document.open();
    e.document.write(t);
    e.document.close();
  </script>
</body>
</html>
